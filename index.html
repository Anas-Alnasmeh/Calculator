<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>calculator</title>
    <link href="master.css" rel="stylesheet">
</head>

<body>
    <div class="parent">
        <img src="imgs/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvcGQzNi0xLXBpYTAwMjcxLWpvYjYyM18xLWwxcHFiZnNjLnBuZw.jpeg"
            alt="">
        <div class="screen">
            <div class="text"></div>
        </div>
        <div class="small-screen">
            <div class="text"></div>
        </div>
        <div class="calculator">
            <button class="deleteAll oper">C</button>
            <button class="delete center-with-flex">
                <div class="up center-with-flex">
                    <div class="inside"></div>
                    <div class="squar oper"><span>×</span></div>
                </div>
            </button>
            <button class="oper">%</button>
            <button class="oper">÷</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="oper">×</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="minus oper">-</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="oper">+</button>
            <button class="dot">.</button>
            <button>0</button>
            <button class="result">=</button>
        </div>
    </div>
    <script src="decimal.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
